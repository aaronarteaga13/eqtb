<html lang="en">

<head>
    <meta charset="UTF-8">

<header>
    <nav style="background: #f4f4f4; padding: 15px 20px; display: flex; justify-content: flex-end; align-items: center;">
        <div style="display: flex; gap: 15px;">
            <a href="/Users/aaronarteaga/Desktop/my-portfolio/EQTB/Pages/main-page.html" style="color: #1d2545;">home</a>

<body style="font-family: 'Sora', sans-serif; background: #f4f4f4; max-width: 900px; margin: auto;">

    <section style="display: flex; justify-content: center; align-items: center; height: 50vh;">
        <div style="text-align: center; max-width: 600px; width: 50%; background: #ffffff; border-radius: 12px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1);">
            <div class="register-container">
                <h1>Create Your Account</h1>
            <hr style="border: none; border-top: 1px solid #ccc; margin: 15px 0;">
                <form id="register-form">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                    <br/>
                    <br/>    
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required>
                    <br/>   
                    <br/>   
                    <label for="confirm-password">Confirm Password:</label>
                    <input type="password" id="confirm-password" name="confirm-password" required>
                    <br/>
                    <br/>    
                    <button type="submit">Register</button>
                </form>
            <p>Already have an account? <a href="/Users/aaronarteaga/Desktop/my-portfolio/EQTB/Pages/log-in.html">Log in here</a>.</p>
            </div>
        </div>
    </section>



    <style>        button {
        background: #1d2545;
        color: white;
        padding: 10px 15px;
        border: none;
        cursor: pointer;
        border-radius: 5px;
        transition: 0.3s;
    }
    </style>



    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            // additional config variables
        };
        const app = firebase.initializeApp(firebaseConfig);

        document.getElementById('register-form').addEventListener('submit', function(event) {
            event.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if(password !== confirmPassword) {
                alert("Passwords do not match.");
                return;
            }

            firebase.auth().createUserWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    // Signed in 
                    const user = userCredential.user;
                    console.log("Registered successfully:", user.email);
                    // Redirect to login page or home page
                    window.location.href = 'index.html';
                })
                .catch((error) => {
                    const errorCode = error.code;
                    const errorMessage = error.message;
                    alert('Registration failed: ' + errorMessage);
                });
        });
    </script>




</body>
</html>
