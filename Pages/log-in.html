<!DOCTYPE html>
<html lang="en">




<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Equation Toolbox</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@100..800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/css/all.min.css" rel="stylesheet">
</head>




<header>
    <nav style="background: #f4f4f4; padding: 15px 20px; display: flex; justify-content: flex-end; align-items: center;">
        <div style="display: flex; gap: 15px;">
            <a href="/Users/aaronarteaga/Desktop/my-portfolio/EQTB/Pages/main-page.html" style="color: #1d2545;">home</a>
        </div>
    </nav>
</header>




<body style="font-family: 'Sora', sans-serif; background: #f4f4f4; max-width: 900px; margin: auto;">

        <section style="display: flex; justify-content: center; align-items: center; height: 50vh;">
        <div style="text-align: center; max-width: 600px; width: 50%; background: #ffffff; border-radius: 12px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1);">
            <div class="login-container">
                <h1>Login to Your Account</h1>
                <hr style="border: none; border-top: 1px solid #ccc; margin: 15px 0;">
                <form id="login-form">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                    <br/>
                    <br/>
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required>
                    <br/>
                    <br/>
                    <button type="submit">Login</button>
                </form>
                <p>Don't have an account? <a href="register.html">Register here</a>.</p>
            </div>
        </div>
    </section>



<style>        button {
    background: #1d2545;
    color: white;
    padding: 10px 15px;
    border: none;
    cursor: pointer;
    border-radius: 5px;
    transition: 0.3s;
}
</style>



    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth.js"></script>
    <script>
        // Your web app's Firebase configuration
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            // additional config variables
        };
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);

        document.getElementById('login-form').addEventListener('submit', function(event) {
            event.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            firebase.auth().signInWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    // Signed in
                    window.location.href = 'index.html'; // Redirect to a new page after successful login
                })
                .catch((error) => {
                    alert('Login failed: ' + error.message);
                });
        });
    </script>





</body>
</html>
